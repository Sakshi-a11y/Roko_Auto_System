<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Vehicle Owner — Register</title>
  <link href="css/style.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="dashboard.html"><i class="fa-solid fa-truck-moving"></i> Vehicle Owner</a>
      <ul class="nav-links">
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html" class="active">Register</a></li>
      </ul>
    </div>
  </nav>

  <main class="container center-page">
    <div class="card auth-card compact">
      <h2>Create Account</h2>
      <p class="muted">Register as a vehicle owner</p>

      <form id="registerForm">

        <div class="form-row">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" required />
        </div>

        <div class="form-row">
          <label for="contact">Contact Number</label>
          <input id="contact" name="contact" type="tel" required />
        </div>

        <div class="form-row">
          <label for="address">Address</label>
          <textarea id="address" name="address" rows="2" required></textarea>
        </div>

        <!-- ✅ NEW: Vehicle Type -->
        <div class="form-row">
          <label for="vehicleType">Vehicle Type</label>
          <input id="vehicleType" name="vehicleType" type="text" placeholder="e.g. Truck, Car, Bus" required />
        </div>

        <!-- ✅ NEW: Registration Number block -->
        <div class="form-row">
          <label for="registrationNumber">Registration Number</label>
          <input id="registrationNumber" name="registrationNumber" type="text" placeholder="e.g. UP32AB1234" required />
        </div>

        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required />
        </div>

        <div class="form-row">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" required />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn primary">Register</button>
        </div>
      </form>

      <p class="muted">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </main>

  <script src="js/register.js?v=2"></script>
</body>
</html>
