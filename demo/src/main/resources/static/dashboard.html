<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vehicle Owner — Dashboard</title>
  <link href="css/style.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="#"><i class="fa-solid fa-truck-moving"></i> Vehicle Owner</a>
      <ul class="nav-links">
        <li><a href="dashboard.html" class="active">Dashboard</a></li>
        <li><a href="login.html">Logout</a></li>
      </ul>
    </div>
  </nav>

  <main class="container dashboard">
    <header class="dashboard-header">
      <h1>Welcome, <span id="ownerName">Owner</span></h1>
      <button id="logoutBtn" class="btn secondary">Logout</button>
    </header>

    <section class="cards">
      <div class="card info-card">
        <h3>Owner Details</h3>
        <p><strong>Name:</strong> <span id="name"></span></p>
        <p><strong>Contact:</strong> <span id="contact"></span></p>
        <p><strong>Address:</strong> <span id="address"></span></p>
      </div>

      <div class="card info-card">
        <h3>Vehicle Details</h3>
        <p><strong>Vehicle No:</strong> <span id="vehicleNumber"></span></p>
        <p><strong>Type:</strong> <span id="vehicleType">N/A</span></p>
        <p><strong>Strike Count:</strong> <span id="strikeCount">0</span></p>
        <p><strong>Status:</strong> <span id="vehicleStatus">N/A</span></p>
      </div>
    </section>

    <section id="blockedPanel" class="card payment-card hidden">
      <h3><i class="fa-solid fa-triangle-exclamation"></i> Vehicle Blocked</h3>
      <p class="muted">Your vehicle has reached 3 strikes. Pay the fine to reset strikes and reactivate your account.</p>
      <p><strong>Fine Amount:</strong> ₹<span id="fineAmount">500</span></p>
      <button id="payFineBtn" class="btn primary">Pay Fine &amp; Reactivate</button>
    </section>
  </main>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="js/dashboard.js?v=3"></script>
</body>
</html>
