<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vehicle Owner — Login</title>
  <link href="css/style.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-p6O2XkX2Q6G1n+v6q8eZ7Yh2q0eGf2xK5u9e3Z1yJk5ZzF2G9Q2k6F1y9x6b3Y3VQ6Z" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="dashboard.html"><i class="fa-solid fa-truck-moving"></i> Vehicle Owner</a>
      <ul class="nav-links">
        <li><a href="login.html" class="active">Login</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </div>
  </nav>

  <main class="container center-page">
    <div class="card auth-card compact">
      <h2>Welcome Back</h2>
      <p class="muted">Login with your vehicle number and password</p>
      <form id="loginForm">
        <div class="form-row">
          <label for="vehicleNumber">Vehicle Number</label>
          <input id="vehicleNumber" name="vehicleNumber" type="text" placeholder="MH12AB1234" required />
        </div>
        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter password" required />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn primary">Login</button>
        </div>
      </form>
      <p class="muted">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
